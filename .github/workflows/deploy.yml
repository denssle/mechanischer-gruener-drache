name: Deploy to Uberspace

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Uberspace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: rsync deployments
        uses: burnett01/rsync-deployments@7.1.0
        with:
          switches: -avzr --delete --exclude=".env" --exclude="node_modules" --exclude=".git" --exclude=".github"
          path: ./
          remote_path: /home/${{ secrets.UBERSPACE_USER }}/mechanischer-gruener-drache/
          remote_host: ${{ secrets.UBERSPACE_HOST }}
          remote_user: ${{ secrets.UBERSPACE_USER }}
          remote_key: ${{ secrets.DEPLOY_KEY_PRIVATE }}

      - name: Restart Bot
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.UBERSPACE_HOST }}
          username: ${{ secrets.UBERSPACE_USER }}
          key: ${{ secrets.DEPLOY_KEY_PRIVATE }}
          script: |
            cd /home/${{ secrets.UBERSPACE_USER }}/mechanischer-gruener-drache/
            npm install --production
            # Hier den Service-Namen anpassen, falls du uberspace service setup genutzt hast
            # svc -du ~/service/bot-service
