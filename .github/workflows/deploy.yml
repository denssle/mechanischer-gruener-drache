name: Deploy to Uberspace

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Uberspace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Create dummy config
        run: echo '{"BOT_TOKEN":"test","CLIENT_ID":"test","GUILD_ID":"test","TWITCH_WEBHOOK_SECRET":"test-secret"}' > config.json

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Twitch Webhook Test
        run: |
          # Bot im Hintergrund starten
          node dist/index.js &
          # Warten bis der Server bereit ist
          sleep 5
          # Webhook Test ausführen
          npx ts-node scripts/test-twitch-webhook.ts notify
          # Bot beenden
          kill $!

      - name: rsync deployments
        uses: burnett01/rsync-deployments@7.1.0
        with:
          switches: -avzr --delete --exclude="config.json"
          path: /
          remote_path: /home/${{ secrets.UBERSPACE_USER }}/mechanischer-gruener-drache/
          remote_host: ${{ secrets.UBERSPACE_HOST }}
          remote_user: ${{ secrets.UBERSPACE_USER }}
          remote_key: ${{ secrets.DEPLOY_KEY_PRIVATE }}

      - name: Restart Supervisor
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.UBERSPACE_HOST }}
          username: ${{ secrets.UBERSPACE_USER }}
          key: ${{ secrets.DEPLOY_KEY_PRIVATE }}
          script: supervisorctl restart drache