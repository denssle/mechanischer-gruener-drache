name: Deploy to Uberspace

on:
  push:
    branches:
      - main
  pull_request:

# Zwei schnell aufeinanderfolgende Pushes auf main duerfen sich nicht ueberlappen
# (paralleles rsync + supervisorctl restart). Laufende Deploys nicht abbrechen.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          # 22 = hoechste auf Uberspace verfuegbare Version (siehe CLAUDE.md), nicht das aktuelle Active LTS
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create dummy config
        run: echo '{"BOT_TOKEN":"test","CLIENT_ID":"test","GUILD_ID":"test","TWITCH_WEBHOOK_SECRET":"test-secret","TWITCH_CLIENT_ID":"test","TWITCH_CLIENT_SECRET":"test"}' > config.json

      - name: Run tests
        run: npm test

      # Type-Check inklusive der Testdateien: die sind seit dem tsconfig-exclude nicht mehr
      # Teil von npm run build, Typfehler dort wuerden sonst nirgends auffallen (vitest/esbuild
      # prueft keine Typen, siehe CLAUDE.md-Stolperfalle zu type-only Imports).
      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Build test scripts
        run: npm run build:scripts

      - name: Twitch Webhook Test
        run: |
          # Bot im Hintergrund starten
          node dist/index.js &
          # Warten bis der Server bereit ist
          sleep 5
          # Webhook Test ausführen (kompiliertes JS, kein ts-node/ESM-Loader nötig)
          node dist-scripts/test-twitch-webhook.js notify
          # Bot beenden
          kill $!
        env:
          CI: true

  deploy:
    name: Deploy to Uberspace
    runs-on: ubuntu-latest
    # Nur nach gruenen Tests und nur bei Push auf main deployen, nicht bei Pull Requests
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Kein Build hier: der Uberspace-Host baut sich beim Restart selbst neu
      # (start-server = npm ci && npm run build && npm start), ein vorgebautes dist/
      # waere Wegwerf-Arbeit. Es wird nur der Source-Baum gesynct.
      - name: rsync deployments
        uses: burnett01/rsync-deployments@7.1.0
        with:
          switches: -avzr --delete --exclude="config.json"
          path: /
          remote_path: /home/${{ secrets.UBERSPACE_USER }}/mechanischer-gruener-drache/
          remote_host: ${{ secrets.UBERSPACE_HOST }}
          remote_user: ${{ secrets.UBERSPACE_USER }}
          remote_key: ${{ secrets.DEPLOY_KEY_PRIVATE }}

      - name: Restart Supervisor
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.UBERSPACE_HOST }}
          username: ${{ secrets.UBERSPACE_USER }}
          key: ${{ secrets.DEPLOY_KEY_PRIVATE }}
          script: supervisorctl restart drache
